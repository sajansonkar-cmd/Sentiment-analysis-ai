<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentiment Analysis AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff4b2b, #ff416c);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: 600;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 400;
        }

        textarea {
            width: 60%;
            height: 120px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 16px;
            resize: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #0072ff;
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: 500;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    🚀 Sentiment Analysis AI
</header>

<div class="container">
    <h2>Analyze Your Text Instantly</h2>

    <form method="POST">
        <textarea name="review" placeholder="Type your text here..."></textarea><br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <div class="result">
            Result: {{ result }}
        </div>
    {% endif %}
</div>

<footer>
    Made by Anchal Bhardwaj & My Team
</footer>

</body>
</html>
